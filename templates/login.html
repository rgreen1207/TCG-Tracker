<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login · PkTracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-gem">◈</div>
      <div class="login-title">PkTracker</div>
      <div class="login-sub">Admin Access Required</div>
    </div>

    {% if error %}
    <div class="login-error">
      Incorrect password{% if error == '429' %} — too many attempts, try again in 15 minutes{% endif %}.
    </div>
    {% endif %}

    <form action="/login" method="post">
      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          type="password"
          name="password"
          class="form-input"
          placeholder="Enter admin password"
          autofocus
          autocomplete="current-password"
          required
        >
      </div>
      <button type="submit" class="btn btn-gold" style="width:100%;justify-content:center;padding:11px">
        Sign In →
      </button>
    </form>

    <div style="margin-top:18px;text-align:center">
      <a href="/" style="font-size:12px;color:var(--text3)">← Back to Dashboard</a>
    </div>
  </div>
</div>
</body>
</html>
